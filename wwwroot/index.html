<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-commerce - Teste do Backend</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-8">

    <div class="max-w-4xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-8">

        <!-- PAINEL ESQUERDO: FORMULÁRIO -->
        <div class="bg-white p-6 rounded-xl shadow-md space-y-6">
            <h1 class="text-xl font-bold text-gray-800">🛒 Fechamento de Pedido</h1>

            <!-- Dados Globais do Pedido -->
            <div class="space-y-3">
                <div>
                    <label class="block text-xs font-semibold text-gray-600 uppercase">ID do Pedido</label>
                    <input type="text" id="pedidoId" value="pedido_final_999" class="w-full p-2 border rounded text-sm">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-600 uppercase">Nome do Cliente</label>
                    <input type="text" id="clienteNome" placeholder="Digite o nome..." class="w-full p-2 border rounded text-sm">
                </div>
            </div>

            <hr>

            <!-- Adicionar Itens -->
            <div>
                <h2 class="text-sm font-bold text-gray-700 mb-2">Adicionar Item ao Carrinho</h2>
                <div class="grid grid-cols-2 gap-2 mb-2">
                    <input type="text" id="itemId" placeholder="ID Item (ex: item_1)" class="p-2 border rounded text-xs">
                    <input type="text" id="prodId" placeholder="ID Prod (ex: POCO_X7)" class="p-2 border rounded text-xs">
                    <input type="number" id="qtd" placeholder="Qtd" value="1" class="p-2 border rounded text-xs">
                    <input type="number" id="preco" value="1000" readonly class="p-2 border rounded text-xs bg-gray-100 cursor-not-allowed">
                </div>
                <button onclick="adicionarItem()" class="w-full bg-gray-800 text-white text-xs py-2 rounded hover:bg-black transition">
                    + Adicionar Item ao Carrinho
                </button>
            </div>

            <!-- Carrinho Atual -->
            <div>
                <h3 class="text-xs font-bold text-gray-500 uppercase mb-1">Itens no Carrinho (<span id="countItens">0</span>)</h3>
                <ul id="listaItens" class="text-xs space-y-1 max-h-32 overflow-y-auto bg-gray-50 p-2 rounded border">
                    <li class="text-gray-400 italic">Nenhum item adicionado ainda.</li>
                </ul>
            </div>

            <button onclick="enviarParaAPI()" class="w-full bg-blue-600 text-white font-bold py-2 rounded shadow hover:bg-blue-700 transition">
                🚀 Enviar Pedido para API
            </button>
        </div>

        <!-- PAINEL DIREITO: RESPOSTA DA API -->
        <div class="bg-gray-900 p-6 rounded-xl shadow-md text-white flex flex-col">
            <h2 class="text-lg font-bold mb-2 flex justify-between items-center">
                <span>Retorno do C# (API)</span>
                <span id="statusBadge" class="text-xs px-2 py-1 rounded bg-gray-700">Aguardando...</span>
            </h2>
            <pre id="jsonOutput" class="text-green-400 text-xs font-mono flex-1 overflow-auto bg-black p-4 rounded border border-gray-800">
// Os dados retornados pela sua Controller vão aparecer aqui em tempo real...
            </pre>
        </div>

    </div>

    <!-- JAVASCRIPT QUE FAZ A MÁGICA -->
    <script>
        const API_URL = "/api/pedido";
        let carrinho = [];

        function adicionarItem() {
            const itemId = document.getElementById('itemId').value || `item_${Date.now()}`;
            const prodId = document.getElementById('prodId').value;
            const qtd = parseInt(document.getElementById('qtd').value) || 1;
            const preco = parseFloat(document.getElementById('preco').value) || 0;
            const pedidoId = document.getElementById('pedidoId').value;

            if (!prodId || preco <= 0) {
                alert("Preencha o ID do Produto!");
                return;
            }

            // Criando o item com a PRIMEIRA LETRA MAIÚSCULA para bater com o C#
            const novoItem = {
                Id: itemId,
                IdProduto: prodId,
                Quantidade: qtd,
                PrecoUnitario: preco,
                ValorTotal: qtd * preco,
                PedidoId: pedidoId
            };

            carrinho.push(novoItem);
            atualizarLista();

            document.getElementById('prodId').value = '';
        }

        function atualizarLista() {
            const ul = document.getElementById('listaItens');
            document.getElementById('countItens').innerText = carrinho.length;

            if (carrinho.length === 0) {
                ul.innerHTML = '<li class="text-gray-400 italic">Nenhum item adicionado ainda.</li>';
                return;
            }

            ul.innerHTML = carrinho.map((item, index) => `
                <li class="flex justify-between items-center bg-white p-1.5 rounded border">
                    <span><b>${item.Quantidade}x</b> ${item.IdProduto} (R$ ${item.ValorTotal})</span>
                    <button onclick="removerItem(${index})" class="text-red-500 font-bold hover:text-red-700">✕</button>
                </li>
            `).join('');
        }

        function removerItem(index) {
            carrinho.splice(index, 1);
            atualizarLista();
        }

        async function enviarParaAPI() {
            const output = document.getElementById('jsonOutput');
            const badge = document.getElementById('statusBadge');

            // Converte os itens para o formato exato da classe Item.cs
            const itensFormatados = carrinho.map(i => ({
                Id: String(i.Id || i.id),
                IdProduto: String(i.IdProduto || i.idProduto),
                Quantidade: Number(i.Quantidade || i.quantidade),
                PrecoUnitario: Number(i.PrecoUnitario || i.precoUnitario),
                ValorTotal: Number(i.ValorTotal || i.valorTotal),
                PedidoId: String(i.PedidoId || i.pedidoId)
            }));

            const payload = {
                Id: document.getElementById('pedidoId').value,
                Cliente: document.getElementById('clienteNome').value,
                Itens: itensFormatados
            };

            output.innerText = "Enviando requisição...";

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (response.ok) {
                    badge.className = "text-xs px-2 py-1 rounded bg-green-600 text-white";
                    badge.innerText = "200 OK";
                    output.className = "text-green-400 text-xs font-mono flex-1 overflow-auto bg-black p-4 rounded border border-gray-800";
                } else {
                    badge.className = "text-xs px-2 py-1 rounded bg-red-600 text-white";
                    badge.innerText = `${response.status} Bad Request`;
                    output.className = "text-red-400 text-xs font-mono flex-1 overflow-auto bg-black p-4 rounded border border-gray-800";
                }

                output.innerText = JSON.stringify(data, null, 2);

            } catch (err) {
                badge.className = "text-xs px-2 py-1 rounded bg-yellow-600 text-white";
                badge.innerText = "Erro de Conexão";
                output.innerText = "Falha ao conectar na API.";
            }
        }
    </script>
</body>
</html>
